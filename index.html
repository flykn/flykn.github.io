<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#111111"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="GymLog"/>
  <link rel="manifest" href="manifest.json"/>
  <title>GymLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #111111;
      --surface:  #1c1c1c;
      --card:     #242424;
      --border:   #333333;
      --accent:   #FF5722;
      --accent-d: #e04a1a;
      --text:     #f0f0f0;
      --muted:    #888888;
      --danger:   #e53935;
      --r:        14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ─── SCREENS (slide navigation) ─── */
    #app { position: relative; width: 100%; height: 100dvh; overflow: hidden; }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      will-change: transform;
      background: var(--bg);
    }
    .screen.active   { transform: translateX(0); }
    .screen.behind   { transform: translateX(-30%); }

    /* ─── HEADER ─── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: var(--bg);
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--text);
    }
    .back-btn svg { width: 20px; height: 20px; }

    .header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700; letter-spacing: .5px;
    }
    .header-title span { color: var(--accent); }

    .add-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,87,34,.4);
      transition: transform .15s, background .15s;
    }
    .add-btn:active { transform: scale(.9); background: var(--accent-d); }
    .add-btn svg { width: 22px; height: 22px; color: #fff; }

    /* ─── SCROLL BODY ─── */
    .body {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
    }

    /* ─── MACHINE GRID ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .machine-card {
      border-radius: var(--r); overflow: hidden;
      aspect-ratio: 3/4;
      position: relative; cursor: pointer;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform .15s;
    }
    .machine-card:active { transform: scale(.97); }

    .machine-card img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .machine-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px 12px 12px;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 100%);
    }
    .machine-card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 16px; font-weight: 600; color: #fff;
      line-height: 1.2;
    }
    .machine-card-count {
      font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px;
    }
    .machine-card-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: var(--muted);
    }
    .machine-card-placeholder svg { width: 36px; height: 36px; }
    .machine-card-placeholder span { font-size: 12px; }

    /* ─── EMPTY STATE ─── */
    .empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 12px;
      height: 60vh; padding: 20px;
    }
    .empty-icon { font-size: 56px; }
    .empty-title {
      font-family: 'Oswald', sans-serif;
      font-size: 22px; color: var(--muted);
    }
    .empty-sub { font-size: 14px; color: var(--muted); max-width: 220px; line-height: 1.5; }

    /* ─── DETAIL HERO ─── */
    .hero {
      position: relative; width: 100%; height: 260px; flex-shrink: 0;
      background: var(--card);
    }
    .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .hero-placeholder svg { width: 56px; height: 56px; }

    .hero-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 40px 16px 14px;
      background: linear-gradient(to top, rgba(0,0,0,.9), transparent);
    }
    .hero-name {
      font-family: 'Oswald', sans-serif;
      font-size: 28px; font-weight: 700; color: #fff;
    }

    /* ─── SESSION LIST ─── */
    .section-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 10px;
    }

    .session-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 10px; overflow: hidden;
    }
    .session-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer;
    }
    .session-date {
      font-family: 'Oswald', sans-serif;
      font-size: 18px; font-weight: 600;
    }
    .session-summary { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .session-chevron {
      color: var(--muted); transition: transform .2s;
      width: 20px; height: 20px; flex-shrink: 0;
    }
    .session-card.open .session-chevron { transform: rotate(180deg); }

    .session-body {
      display: none; border-top: 1px solid var(--border);
      padding: 12px 16px;
    }
    .session-card.open .session-body { display: block; }

    .sets-table { width: 100%; border-collapse: collapse; }
    .sets-table th {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .5px; padding: 4px 0; text-align: left; font-weight: 500;
    }
    .sets-table td { padding: 6px 0; font-size: 15px; border-top: 1px solid var(--border); }
    .sets-table td:first-child { color: var(--accent); font-weight: 600; width: 36px; }
    .sets-table td:last-child { color: var(--muted); font-size: 13px; text-align: right; }

    .session-del-btn {
      margin-top: 12px; width: 100%; padding: 9px;
      background: transparent; border: 1px solid var(--danger);
      border-radius: 8px; color: var(--danger); font-size: 13px;
      cursor: pointer; font-family: 'Inter', sans-serif;
    }

    /* ─── BOTTOM SHEET ─── */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 200; display: none; align-items: flex-end;
    }
    .sheet-backdrop.open { display: flex; }

    .sheet {
      background: var(--surface); width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 0 16px calc(24px + env(safe-area-inset-bottom));
      max-height: 92dvh; overflow-y: auto;
      border-top: 1px solid var(--border);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 20px;
    }
    .sheet-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px; font-weight: 600; margin-bottom: 20px;
      color: var(--accent);
    }

    /* ─── FORM ─── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--muted); margin-bottom: 7px;
    }
    .field input, .field select {
      width: 100%; background: var(--card);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 13px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 16px;
      -webkit-appearance: none; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field select option { background: var(--card); }

    /* photo picker */
    .photo-pick {
      width: 100%; height: 150px;
      background: var(--card); border: 2px dashed var(--border);
      border-radius: 12px; position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; cursor: pointer; overflow: hidden;
    }
    .photo-pick input {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%; font-size: 0;
    }
    .photo-pick img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .photo-pick-icon { color: var(--muted); pointer-events: none; }
    .photo-pick-icon svg { width: 32px; height: 32px; }
    .photo-pick-label { font-size: 13px; color: var(--muted); pointer-events: none; }

    /* set rows in form */
    .set-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .set-row {
      display: grid; grid-template-columns: 28px 1fr 24px 1fr 32px;
      align-items: center; gap: 6px;
      background: var(--card); border-radius: 10px; padding: 8px 10px;
    }
    .set-num {
      font-family: 'Oswald', sans-serif;
      font-size: 18px; color: var(--accent); text-align: center;
    }
    .set-inp {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 6px;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 15px; text-align: center; outline: none;
      -webkit-appearance: none;
    }
    .set-inp:focus { border-color: var(--accent); }
    .set-unit { font-size: 11px; color: var(--muted); text-align: center; }
    .set-del {
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center; padding: 2px;
    }
    .set-del svg { width: 18px; height: 18px; }

    .add-set-btn {
      width: 100%; padding: 10px;
      background: transparent; border: 1px dashed var(--border);
      border-radius: 10px; color: var(--muted); font-size: 14px;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .add-set-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ─── BUTTONS ─── */
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 12px; border: none;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.97); opacity: .9; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff; padding: 10px 22px;
      border-radius: 30px; font-size: 14px; font-weight: 600;
      white-space: nowrap; z-index: 999;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════
       SCREEN 1 — HOME
  ══════════════════════════════════════ -->
  <div class="screen active" id="s-home">
    <div class="header">
      <div class="header-title">Gym<span>Log</span></div>
      <button class="add-btn" id="home-add-btn" aria-label="Добавить тренажёр">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="body">
      <div id="machine-grid"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN 2 — MACHINE DETAIL
  ══════════════════════════════════════ -->
  <div class="screen" id="s-detail">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="goHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="header-title" id="detail-header-name">Тренажёр</div>
      </div>
      <button class="add-btn" id="detail-add-btn" aria-label="Добавить тренировку">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="body" style="padding:0">
      <div class="hero">
        <img id="detail-hero-img" src="" alt="" style="display:none"/>
        <div class="hero-placeholder" id="detail-hero-ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="hero-bar">
          <div class="hero-name" id="detail-hero-name"></div>
        </div>
      </div>
      <div style="padding:16px">
        <div class="section-label">История тренировок</div>
        <div id="session-list"></div>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ══════════════════════════════════════
     SHEET: ADD MACHINE
══════════════════════════════════════ -->
<div class="sheet-backdrop" id="sheet-machine">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Новый тренажёр</div>

    <div class="field">
      <label>Фото тренажёра</label>
      <div class="photo-pick" onclick="document.getElementById('m-photo-input').click()">
        <input type="file" id="m-photo-input" accept="image/*" onchange="onMachinePhoto(event)"/>
        <div class="photo-pick-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span class="photo-pick-label">Нажмите, чтобы выбрать фото</span>
      </div>
    </div>

    <div class="field">
      <label>Название тренажёра *</label>
      <input type="text" id="m-name" placeholder="Жим лёжа, Тяга блока…"/>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet('sheet-machine')">Отмена</button>
      <button class="btn btn-primary" onclick="saveMachine()">Добавить</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SHEET: ADD SESSION
══════════════════════════════════════ -->
<div class="sheet-backdrop" id="sheet-session">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Запись тренировки</div>

    <div class="field">
      <label>Дата</label>
      <input type="date" id="s-date"/>
    </div>

    <div class="field">
      <label>Подходы</label>
      <div class="set-rows" id="set-rows"></div>
      <button class="add-set-btn" onclick="addSetRow()">+ Добавить подход</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet('sheet-session')">Отмена</button>
      <button class="btn btn-primary" onclick="saveSession()">Сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
let DB = { machines: [], sessions: [] };

function persist() { localStorage.setItem('gymlog_v2', JSON.stringify(DB)); }
function load() {
  try { const r = localStorage.getItem('gymlog_v2'); if (r) DB = JSON.parse(r); } catch(_) {}
}

// ═══════════════════════════════════════
//  NAV
// ═══════════════════════════════════════
let currentMachineId = null;

function goDetail(machineId) {
  currentMachineId = machineId;
  const m = DB.machines.find(x => x.id === machineId);
  if (!m) return;

  // hero
  const img = document.getElementById('detail-hero-img');
  const ph  = document.getElementById('detail-hero-ph');
  if (m.photo) { img.src = m.photo; img.style.display = 'block'; ph.style.display = 'none'; }
  else          { img.style.display = 'none'; ph.style.display = 'flex'; }

  document.getElementById('detail-hero-name').textContent = m.name;
  document.getElementById('detail-header-name').textContent = m.name;

  renderSessions();

  document.getElementById('s-home').classList.add('behind');
  document.getElementById('s-detail').classList.add('active');
}

function goHome() {
  document.getElementById('s-home').classList.remove('behind');
  document.getElementById('s-detail').classList.remove('active');
  currentMachineId = null;
  renderMachines();
}

// ═══════════════════════════════════════
//  RENDER MACHINES
// ═══════════════════════════════════════
function renderMachines() {
  const grid = document.getElementById('machine-grid');
  if (!DB.machines.length) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏋️</div>
        <div class="empty-title">Нет тренажёров</div>
        <div class="empty-sub">Нажми <strong>+</strong> в правом верхнем углу, чтобы добавить первый тренажёр</div>
      </div>`;
    return;
  }
  grid.innerHTML = `<div class="grid">${DB.machines.map(m => {
    const cnt = DB.sessions.filter(s => s.machineId === m.id).length;
    return `<div class="machine-card" onclick="goDetail('${m.id}')">
      ${m.photo
        ? `<img src="${m.photo}" alt="${m.name}"/>`
        : `<div class="machine-card-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>Нет фото</span>
           </div>`}
      <div class="machine-card-overlay">
        <div class="machine-card-name">${m.name}</div>
        <div class="machine-card-count">${cnt ? cnt + ' ' + plural(cnt,'тренировка','тренировки','тренировок') : 'Нет записей'}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function plural(n, a, b, c) {
  const m = n % 100;
  if (m >= 11 && m <= 14) return c;
  const k = m % 10;
  if (k === 1) return a;
  if (k >= 2 && k <= 4) return b;
  return c;
}

// ═══════════════════════════════════════
//  ADD MACHINE
// ═══════════════════════════════════════
let machinePhotoData = null;

document.getElementById('home-add-btn').onclick = () => {
  machinePhotoData = null;
  document.getElementById('m-name').value = '';
  const pp = document.getElementById('m-photo-input');
  pp.value = '';
  const pick = pp.closest('.photo-pick');
  pick.querySelector('img')?.remove();
  pick.querySelector('.photo-pick-icon').style.display = '';
  pick.querySelector('.photo-pick-label').style.display = '';
  openSheet('sheet-machine');
};

function onMachinePhoto(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    machinePhotoData = ev.target.result;
    const pick = e.target.closest('.photo-pick');
    let img = pick.querySelector('img');
    if (!img) { img = document.createElement('img'); pick.appendChild(img); }
    img.src = machinePhotoData;
    pick.querySelector('.photo-pick-icon').style.display = 'none';
    pick.querySelector('.photo-pick-label').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function saveMachine() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { toast('Введите название'); return; }
  DB.machines.push({ id: uid(), name, photo: machinePhotoData, createdAt: Date.now() });
  persist();
  closeSheet('sheet-machine');
  renderMachines();
  toast('✅ Тренажёр добавлен');
}

// ═══════════════════════════════════════
//  RENDER SESSIONS
// ═══════════════════════════════════════
function renderSessions() {
  const list = document.getElementById('session-list');
  const sessions = DB.sessions
    .filter(s => s.machineId === currentMachineId)
    .sort((a, b) => b.date.localeCompare(a.date));

  if (!sessions.length) {
    list.innerHTML = `
      <div class="empty" style="height:40vh">
        <div class="empty-icon">📋</div>
        <div class="empty-title">Нет записей</div>
        <div class="empty-sub">Нажми <strong>+</strong>, чтобы записать первую тренировку</div>
      </div>`;
    return;
  }

  list.innerHTML = sessions.map(s => {
    const totalSets = s.sets.length;
    const weights   = s.sets.map(x => x.weight).filter(w => w > 0);
    const wRange    = weights.length
      ? (Math.min(...weights) === Math.max(...weights)
          ? `${Math.min(...weights)} кг`
          : `${Math.min(...weights)}–${Math.max(...weights)} кг`)
      : '— кг';
    const dateLabel = fmtDate(s.date);
    const rows = s.sets.map((set, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${set.weight} кг</td>
        <td>${set.reps} повт.</td>
        <td>${(set.weight * set.reps).toFixed(0)} кг объём</td>
      </tr>`).join('');

    return `<div class="session-card" id="sc-${s.id}">
      <div class="session-head" onclick="toggleSession('${s.id}')">
        <div>
          <div class="session-date">${dateLabel}</div>
          <div class="session-summary">${totalSets} ${plural(totalSets,'подход','подхода','подходов')} · ${wRange}</div>
        </div>
        <svg class="session-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="session-body">
        <table class="sets-table">
          <thead><tr>
            <th>#</th><th>Вес</th><th>Повт.</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <button class="session-del-btn" onclick="deleteSession('${s.id}')">Удалить запись</button>
      </div>
    </div>`;
  }).join('');
}

function toggleSession(id) {
  document.getElementById('sc-' + id)?.classList.toggle('open');
}

function deleteSession(id) {
  if (!confirm('Удалить эту запись?')) return;
  DB.sessions = DB.sessions.filter(s => s.id !== id);
  persist();
  renderSessions();
  toast('Удалено');
}

function fmtDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  const today    = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (iso === today)     return 'Сегодня';
  if (iso === yesterday) return 'Вчера';
  return d.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
}

// ═══════════════════════════════════════
//  ADD SESSION
// ═══════════════════════════════════════
let setRows = [];

document.getElementById('detail-add-btn').onclick = () => {
  document.getElementById('s-date').value = new Date().toISOString().slice(0,10);
  setRows = [{ weight: '', reps: '' }];
  renderSetRows();
  openSheet('sheet-session');
};

function addSetRow() {
  const last = setRows[setRows.length - 1];
  setRows.push({ weight: last?.weight || '', reps: '' });
  renderSetRows();
}

function removeSetRow(i) {
  if (setRows.length <= 1) return;
  setRows.splice(i, 1);
  renderSetRows();
}

function renderSetRows() {
  const container = document.getElementById('set-rows');
  container.innerHTML = setRows.map((s, i) => `
    <div class="set-row">
      <span class="set-num">${i+1}</span>
      <input class="set-inp" type="number" inputmode="decimal" min="0" step="0.5"
        placeholder="0" value="${s.weight}"
        onchange="setRows[${i}].weight = this.value"
        oninput="setRows[${i}].weight = this.value"/>
      <span class="set-unit">кг</span>
      <input class="set-inp" type="number" inputmode="numeric" min="1" step="1"
        placeholder="0" value="${s.reps}"
        onchange="setRows[${i}].reps = this.value"
        oninput="setRows[${i}].reps = this.value"/>
      <span class="set-unit">×</span>
      ${setRows.length > 1
        ? `<button class="set-del" onclick="removeSetRow(${i})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
           </button>`
        : '<span></span>'}
    </div>`).join('');
}

function saveSession() {
  if (!currentMachineId) return;
  const date = document.getElementById('s-date').value;
  if (!date) { toast('Выберите дату'); return; }

  const sets = setRows
    .filter(s => s.weight !== '' || s.reps !== '')
    .map(s => ({ weight: parseFloat(s.weight) || 0, reps: parseInt(s.reps) || 0 }));

  if (!sets.length) { toast('Добавьте хотя бы один подход'); return; }

  DB.sessions.push({ id: uid(), machineId: currentMachineId, date, sets, createdAt: Date.now() });
  persist();
  closeSheet('sheet-session');
  renderSessions();
  toast('✅ Тренировка сохранена');
}

// ═══════════════════════════════════════
//  SHEET HELPERS
// ═══════════════════════════════════════
function openSheet(id)  { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.sheet-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════
//  UTIL
// ═══════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
load();
renderMachines();
</script>
