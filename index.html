<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#111111"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="GymLog"/>
  <link rel="manifest" href="manifest.json"/>
  <title>GymLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#111; --surface:#1c1c1c; --card:#242424; --border:#333;
      --accent:#FF5722; --accent-d:#e04a1a; --text:#f0f0f0; --muted:#888;
      --danger:#e53935; --r:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overscroll-behavior:none;}

    #app{position:relative;width:100%;height:100dvh;overflow:hidden;}
    .screen{position:absolute;inset:0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);background:var(--bg);}
    .screen.active{transform:translateX(0);}
    .screen.behind{transform:translateX(-30%);}

    .header{display:flex;align-items:center;justify-content:space-between;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);}
    .header-left,.header-right{display:flex;align-items:center;gap:8px;}
    .header-title{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;}
    .header-title span{color:var(--accent);}

    .back-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);}
    .back-btn svg{width:20px;height:20px;}

    .add-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,87,34,.35);transition:transform .15s;}
    .add-btn:active{transform:scale(.9);}
    .add-btn svg{width:22px;height:22px;color:#fff;}

    .menu-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);}
    .menu-btn svg{width:20px;height:20px;}

    .body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    .body-pad{padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom));}

    /* GRID */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .machine-card{border-radius:var(--r);overflow:hidden;aspect-ratio:3/4;position:relative;cursor:pointer;background:var(--card);border:1px solid var(--border);transition:transform .15s;}
    .machine-card:active{transform:scale(.96);}
    .machine-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .card-overlay{position:absolute;bottom:0;left:0;right:0;padding:36px 12px 12px;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);}
    .card-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:#fff;line-height:1.2;}
    .card-count{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;}
    .card-noimg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);}
    .card-noimg svg{width:36px;height:36px;}
    .card-noimg span{font-size:11px;}

    /* EMPTY */
    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px 20px;}
    .empty-ico{font-size:54px;}
    .empty-t{font-family:'Oswald',sans-serif;font-size:22px;color:var(--muted);}
    .empty-s{font-size:14px;color:var(--muted);max-width:220px;line-height:1.5;}

    /* HERO */
    .hero{position:relative;width:100%;height:260px;flex-shrink:0;background:var(--card);}
    .hero img{width:100%;height:100%;object-fit:cover;display:block;}
    .hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);}
    .hero-ph svg{width:56px;height:56px;}
    .hero-bar{position:absolute;bottom:0;left:0;right:0;padding:44px 16px 14px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);}
    .hero-name{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:#fff;}

    /* SECTION */
    .sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}

    /* SESSION CARD */
    .ses-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
    .ses-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
    .ses-date{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;}
    .ses-sub{font-size:12px;color:var(--muted);margin-top:2px;}
    .ses-chev{color:var(--muted);transition:transform .2s;width:20px;height:20px;flex-shrink:0;}
    .ses-card.open .ses-chev{transform:rotate(180deg);}
    .ses-body{display:none;border-top:1px solid var(--border);padding:12px 16px;}
    .ses-card.open .ses-body{display:block;}
    .tbl{width:100%;border-collapse:collapse;}
    .tbl th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px 0;text-align:left;font-weight:500;}
    .tbl td{padding:7px 0;font-size:15px;border-top:1px solid var(--border);}
    .tbl td:first-child{color:var(--accent);font-weight:600;width:32px;}
    .tbl td:last-child{color:var(--muted);font-size:13px;text-align:right;}
    .del-ses-btn{margin-top:12px;width:100%;padding:9px;background:transparent;border:1px solid var(--danger);border-radius:8px;color:var(--danger);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

    /* BOTTOM SHEET */
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:flex-end;}
    .backdrop.open{display:flex;}
    .sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;padding:0 16px calc(28px + env(safe-area-inset-bottom));max-height:92dvh;overflow-y:auto;border-top:1px solid var(--border);animation:up .25s ease;}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 20px;}
    .sheet-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;margin-bottom:20px;color:var(--accent);}

    /* OPTION LIST */
    .opt-item{display:flex;align-items:center;gap:14px;padding:16px 4px;cursor:pointer;border-bottom:1px solid var(--border);font-size:16px;color:var(--text);}
    .opt-item:last-of-type{border-bottom:none;}
    .opt-item svg{width:22px;height:22px;flex-shrink:0;color:var(--muted);}
    .opt-item.danger{color:var(--danger);}
    .opt-item.danger svg{color:var(--danger);}

    /* FORM */
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;}
    .field input[type=text],.field input[type=date]{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;-webkit-appearance:none;outline:none;}
    .field input:focus{border-color:var(--accent);}

    /* PHOTO PICKER — label trick for reliable Android click */
    .photo-label{display:block;width:100%;height:150px;border-radius:12px;overflow:hidden;position:relative;cursor:pointer;}
    .photo-label input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;font-size:0;}
    .photo-placeholder{width:100%;height:100%;background:var(--card);border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;}
    .photo-placeholder svg{width:32px;height:32px;color:var(--muted);}
    .photo-placeholder span{font-size:13px;color:var(--muted);}
    .photo-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:12px;}
    .photo-preview.show{display:block;}

    /* SET ROWS */
    .set-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
    .set-row{display:grid;grid-template-columns:28px 1fr 22px 1fr 30px;align-items:center;gap:6px;background:var(--card);border-radius:10px;padding:8px 10px;}
    .set-num{font-family:'Oswald',sans-serif;font-size:18px;color:var(--accent);text-align:center;}
    .set-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 4px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;text-align:center;outline:none;-webkit-appearance:none;width:100%;}
    .set-inp:focus{border-color:var(--accent);}
    .set-unit{font-size:11px;color:var(--muted);text-align:center;}
    .set-del{background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;padding:2px;}
    .set-del svg{width:16px;height:16px;}
    .add-set-btn{width:100%;padding:11px;background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;transition:border-color .15s,color .15s;}
    .add-set-btn:active{border-color:var(--accent);color:var(--accent);}

    /* BUTTONS */
    .btn-row{display:flex;gap:10px;margin-top:20px;}
    .btn{flex:1;padding:14px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:transform .1s;}
    .btn:active{transform:scale(.97);}
    .btn-p{background:var(--accent);color:#fff;}
    .btn-g{background:var(--card);color:var(--text);border:1px solid var(--border);}

    /* TOAST */
    #toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;font-weight:600;white-space:nowrap;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="header">
      <div class="header-title">Gym<span>Log</span></div>
      <button class="add-btn" id="btn-add-machine">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="body body-pad"><div id="machine-grid"></div></div>
  </div>

  <!-- DETAIL -->
  <div class="screen" id="s-detail">
    <div class="header">
      <div class="header-left">
        <button class="back-btn" onclick="goHome()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="header-title" id="d-title">Тренажёр</div>
      </div>
      <div class="header-right">
        <button class="menu-btn" id="btn-machine-menu">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
        </button>
        <button class="add-btn" id="btn-add-session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="body" style="padding:0">
      <div class="hero">
        <img id="d-hero-img" src="" alt="" style="display:none"/>
        <div class="hero-ph" id="d-hero-ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div class="hero-bar"><div class="hero-name" id="d-hero-name"></div></div>
      </div>
      <div class="body-pad">
        <div class="sec-label">История тренировок</div>
        <div id="session-list"></div>
      </div>
    </div>
  </div>

</div>

<!-- SHEET: ADD MACHINE -->
<div class="backdrop" id="sh-machine">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Новый тренажёр</div>
    <div class="field">
      <label>Фото тренажёра</label>
      <label class="photo-label">
        <input type="file" id="inp-add-photo" accept="image/*"/>
        <div class="photo-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Нажмите, чтобы выбрать фото</span>
        </div>
        <img class="photo-preview" id="prev-add-photo" alt=""/>
      </label>
    </div>
    <div class="field">
      <label>Название тренажёра *</label>
      <input type="text" id="inp-machine-name" placeholder="Жим лёжа, Тяга блока…"/>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="closeSheet('sh-machine')">Отмена</button>
      <button class="btn btn-p" onclick="saveMachine()">Добавить</button>
    </div>
  </div>
</div>

<!-- SHEET: MACHINE MENU -->
<div class="backdrop" id="sh-menu">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="sh-menu-title">Действия</div>
    <div class="opt-item" onclick="openChangePhoto()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Сменить фото
    </div>
    <div class="opt-item danger" onclick="deleteMachine()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Удалить тренажёр
    </div>
    <div class="btn-row"><button class="btn btn-g" onclick="closeSheet('sh-menu')">Закрыть</button></div>
  </div>
</div>

<!-- SHEET: CHANGE PHOTO -->
<div class="backdrop" id="sh-change-photo">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Сменить фото</div>
    <div class="field">
      <label class="photo-label">
        <input type="file" id="inp-change-photo" accept="image/*"/>
        <div class="photo-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Нажмите, чтобы выбрать фото</span>
        </div>
        <img class="photo-preview" id="prev-change-photo" alt=""/>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="closeSheet('sh-change-photo')">Отмена</button>
      <button class="btn btn-p" onclick="saveNewPhoto()">Сохранить</button>
    </div>
  </div>
</div>

<!-- SHEET: ADD SESSION -->
<div class="backdrop" id="sh-session">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Запись тренировки</div>
    <div class="field">
      <label>Дата</label>
      <input type="date" id="inp-date"/>
    </div>
    <div class="field">
      <label>Подходы (вес кг × повторения)</label>
      <div class="set-rows" id="set-rows"></div>
      <button class="add-set-btn" onclick="addSetRow()">+ Добавить подход</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-g" onclick="closeSheet('sh-session')">Отмена</button>
      <button class="btn btn-p" onclick="saveSession()">Сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DB ──────────────────────────────────────
let DB = { machines: [], sessions: [] };
function save() { try { localStorage.setItem('gymlog3', JSON.stringify(DB)); } catch(e){} }
function load() { try { const r = localStorage.getItem('gymlog3'); if(r) DB = JSON.parse(r); } catch(e){} }

// migrate from old key
(function migrate() {
  try {
    const old = localStorage.getItem('gymlog_v2');
    if (old && !localStorage.getItem('gymlog3')) {
      localStorage.setItem('gymlog3', old);
    }
  } catch(e){}
})();

// ── NAV ─────────────────────────────────────
let currentId = null;

function goDetail(id) {
  currentId = id;
  const m = DB.machines.find(x => x.id === id);
  if (!m) return;
  document.getElementById('d-title').textContent = m.name;
  document.getElementById('d-hero-name').textContent = m.name;
  document.getElementById('sh-menu-title').textContent = m.name;
  const img = document.getElementById('d-hero-img');
  const ph  = document.getElementById('d-hero-ph');
  if (m.photo) { img.src = m.photo; img.style.display = 'block'; ph.style.display = 'none'; }
  else          { img.style.display = 'none'; ph.style.display = 'flex'; }
  renderSessions();
  document.getElementById('s-home').classList.add('behind');
  document.getElementById('s-detail').classList.add('active');
}

function goHome() {
  document.getElementById('s-home').classList.remove('behind');
  document.getElementById('s-detail').classList.remove('active');
  currentId = null;
  renderGrid();
}

// ── RENDER GRID ──────────────────────────────
function renderGrid() {
  const el = document.getElementById('machine-grid');
  if (!DB.machines.length) {
    el.innerHTML = `<div class="empty" style="height:70vh">
      <div class="empty-ico">🏋️</div>
      <div class="empty-t">Нет тренажёров</div>
      <div class="empty-s">Нажми <strong>+</strong> в правом верхнем углу, чтобы добавить первый тренажёр</div>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="grid">${DB.machines.map(m => {
    const cnt = DB.sessions.filter(s => s.machineId === m.id).length;
    return `<div class="machine-card" onclick="goDetail('${m.id}')">
      ${m.photo ? `<img src="${m.photo}" alt="${m.name}"/>` : `<div class="card-noimg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Нет фото</span></div>`}
      <div class="card-overlay">
        <div class="card-name">${m.name}</div>
        <div class="card-count">${cnt ? cnt + ' ' + pl(cnt,'тренировка','тренировки','тренировок') : 'Нет записей'}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── ADD MACHINE ──────────────────────────────
let addPhotoData = null;

document.getElementById('btn-add-machine').onclick = () => {
  addPhotoData = null;
  document.getElementById('inp-machine-name').value = '';
  document.getElementById('inp-add-photo').value = '';
  resetPreview('prev-add-photo');
  openSheet('sh-machine');
};

document.getElementById('inp-add-photo').addEventListener('change', function() {
  readFile(this.files[0], data => {
    addPhotoData = data;
    showPreview('prev-add-photo', data);
  });
});

function saveMachine() {
  const name = document.getElementById('inp-machine-name').value.trim();
  if (!name) { toast('Введите название'); return; }
  DB.machines.push({ id: uid(), name, photo: addPhotoData, createdAt: Date.now() });
  save(); closeSheet('sh-machine'); renderGrid(); toast('✅ Тренажёр добавлен');
}

// ── MACHINE MENU ─────────────────────────────
document.getElementById('btn-machine-menu').onclick = () => openSheet('sh-menu');

function deleteMachine() {
  if (!confirm('Удалить тренажёр? Все записи тренировок тоже удалятся.')) return;
  DB.machines = DB.machines.filter(m => m.id !== currentId);
  DB.sessions = DB.sessions.filter(s => s.machineId !== currentId);
  save(); closeSheet('sh-menu'); goHome(); toast('Тренажёр удалён');
}

// ── CHANGE PHOTO ─────────────────────────────
let changePhotoData = null;

function openChangePhoto() {
  closeSheet('sh-menu');
  changePhotoData = null;
  document.getElementById('inp-change-photo').value = '';
  resetPreview('prev-change-photo');
  setTimeout(() => openSheet('sh-change-photo'), 280);
}

document.getElementById('inp-change-photo').addEventListener('change', function() {
  readFile(this.files[0], data => {
    changePhotoData = data;
    showPreview('prev-change-photo', data);
  });
});

function saveNewPhoto() {
  if (!changePhotoData) { toast('Выберите фото'); return; }
  const m = DB.machines.find(x => x.id === currentId);
  if (!m) return;
  m.photo = changePhotoData;
  save();
  const img = document.getElementById('d-hero-img');
  const ph  = document.getElementById('d-hero-ph');
  img.src = changePhotoData; img.style.display = 'block'; ph.style.display = 'none';
  closeSheet('sh-change-photo');
  toast('✅ Фото обновлено');
}

// ── SESSIONS ─────────────────────────────────
let setRows = [];

document.getElementById('btn-add-session').onclick = () => {
  document.getElementById('inp-date').value = today();
  setRows = [{ w:'', r:'' }];
  renderSetRows();
  openSheet('sh-session');
};

function addSetRow() {
  setRows.push({ w: setRows[setRows.length-1]?.w || '', r:'' });
  renderSetRows();
}

function removeSetRow(i) {
  if (setRows.length <= 1) return;
  setRows.splice(i, 1);
  renderSetRows();
}

function renderSetRows() {
  document.getElementById('set-rows').innerHTML = setRows.map((s, i) => `
    <div class="set-row">
      <span class="set-num">${i+1}</span>
      <input class="set-inp" type="number" inputmode="decimal" min="0" step="0.5" placeholder="0" value="${s.w}"
        oninput="setRows[${i}].w=this.value"/>
      <span class="set-unit">кг</span>
      <input class="set-inp" type="number" inputmode="numeric" min="1" step="1" placeholder="0" value="${s.r}"
        oninput="setRows[${i}].r=this.value"/>
      ${setRows.length > 1
        ? `<button class="set-del" onclick="removeSetRow(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
        : '<span></span>'}
    </div>`).join('');
}

function saveSession() {
  const date = document.getElementById('inp-date').value;
  if (!date) { toast('Выберите дату'); return; }
  const sets = setRows.filter(s => s.w!=='' || s.r!=='').map(s => ({ weight: parseFloat(s.w)||0, reps: parseInt(s.r)||0 }));
  if (!sets.length) { toast('Добавьте хотя бы один подход'); return; }
  DB.sessions.push({ id: uid(), machineId: currentId, date, sets, createdAt: Date.now() });
  save(); closeSheet('sh-session'); renderSessions(); toast('✅ Тренировка сохранена');
}

function renderSessions() {
  const el = document.getElementById('session-list');
  const list = DB.sessions.filter(s => s.machineId === currentId).sort((a,b) => b.date.localeCompare(a.date));
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-t">Нет записей</div><div class="empty-s">Нажми <strong>+</strong>, чтобы записать первую тренировку</div></div>`;
    return;
  }
  el.innerHTML = list.map(s => {
    const ws = s.sets.map(x => x.weight).filter(w => w > 0);
    const wr = ws.length ? (Math.min(...ws)===Math.max(...ws) ? `${Math.min(...ws)} кг` : `${Math.min(...ws)}–${Math.max(...ws)} кг`) : '—';
    const rows = s.sets.map((x,i) => `<tr><td>${i+1}</td><td>${x.weight} кг</td><td>${x.reps} повт.</td><td>${(x.weight*x.reps).toFixed(0)} кг</td></tr>`).join('');
    return `<div class="ses-card" id="sc-${s.id}">
      <div class="ses-head" onclick="document.getElementById('sc-${s.id}').classList.toggle('open')">
        <div><div class="ses-date">${fmtDate(s.date)}</div><div class="ses-sub">${s.sets.length} ${pl(s.sets.length,'подход','подхода','подходов')} · ${wr}</div></div>
        <svg class="ses-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ses-body">
        <table class="tbl"><thead><tr><th>#</th><th>Вес</th><th>Повт.</th><th>Объём</th></tr></thead><tbody>${rows}</tbody></table>
        <button class="del-ses-btn" onclick="delSession('${s.id}')">Удалить запись</button>
      </div>
    </div>`;
  }).join('');
}

function delSession(id) {
  if (!confirm('Удалить эту запись?')) return;
  DB.sessions = DB.sessions.filter(s => s.id !== id);
  save(); renderSessions(); toast('Удалено');
}

// ── SHEETS ───────────────────────────────────
function openSheet(id)  { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});

// ── PHOTO HELPERS ────────────────────────────
function readFile(file, cb) {
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => cb(ev.target.result);
  r.readAsDataURL(file);
}
function showPreview(id, src) {
  const img = document.getElementById(id);
  img.src = src;
  img.classList.add('show');
}
function resetPreview(id) {
  const img = document.getElementById(id);
  img.src = '';
  img.classList.remove('show');
}

// ── UTILS ────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function today() { return new Date().toISOString().slice(0,10); }
function pl(n, a, b, c) { const m=n%100; if(m>=11&&m<=14) return c; const k=m%10; return k===1?a:k>=2&&k<=4?b:c; }
function fmtDate(iso) {
  const d = new Date(iso+'T12:00:00');
  const t = today(), y = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (iso===t) return 'Сегодня';
  if (iso===y) return 'Вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INIT ─────────────────────────────────────
load();
renderGrid();
</script>
